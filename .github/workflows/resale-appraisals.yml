name: Resale Appraisals

on:
  workflow_dispatch:
    inputs:
      scope_type:
        description: "Scope"
        type: choice
        options: [region, project, unit, all]
        default: region
      scope_value:
        description: "Region name / project name / unit Index (blank for all)"
        default: "Orlando MSA"
      dry_run:
        description: "Dry run (render only, no database writes)"
        type: boolean
        default: true
      limit:
        description: "Optional unit cap (blank = no cap)"
        default: ""
  schedule:
    - cron: "0 8 1 * *"   # 1st of the month, 08:00 UTC; no-ops unless ENABLE_MONTHLY=true

jobs:
  appraise:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || vars.ENABLE_MONTHLY == 'true'
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r resale-appraisal/requirements.txt
      - name: Render self-test (offline gate)
        run: python3 resale-appraisal/test_render.py
      - name: Run appraisals
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="--all"
          else
            case "${{ inputs.scope_type }}" in
              region)  ARGS="--region \"${{ inputs.scope_value }}\"" ;;
              project) ARGS="--project \"${{ inputs.scope_value }}\"" ;;
              unit)    ARGS="--unit \"${{ inputs.scope_value }}\"" ;;
              all)     ARGS="--all" ;;
            esac
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          fi
          eval python3 resale-appraisal/run_appraisals.py $ARGS
      - name: Upload run output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appraisal-run-${{ github.run_number }}
          path: resale-appraisal/out/
      - name: Digest webhook (optional)
        if: always()
        env:
          HOOK: ${{ secrets.DIGEST_WEBHOOK_URL }}
        run: |
          if [ -n "$HOOK" ] && [ -f resale-appraisal/out/summary.json ]; then
            curl -s -X POST -H "Content-Type: application/json" \
              --data @resale-appraisal/out/summary.json "$HOOK" || true
          fi
